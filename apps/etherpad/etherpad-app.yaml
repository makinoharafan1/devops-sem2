apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etherpad
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://ether.github.io/ether-charts
    chart: etherpad
    targetRevision: "*"
    helm:
      releaseName: etherpad
      values: |
        replicaCount: 1
        service:
          type: ClusterIP
          port: 9001
        ingress:
          enabled: true
          hosts:
            - host: etherpad.cluster.k8s
              paths:
                - path: /
                  pathType: Prefix
        env:
          - name: NODE_ENV
            value: production
          - name: DB_TYPE
            value: postgres
          - name: DB_HOST
            value: postgres
          - name: DB_PORT
            value: "5432"
          - name: DB_NAME
            value: etherpad
          - name: DB_USER
            value: etherpad
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: password
          - name: DB_CHARSET
            value: utf8mb4
          - name: TRUST_PROXY
            value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: etherpad
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
