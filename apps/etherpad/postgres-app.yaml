apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://ether.github.io/ether-charts
    chart: postgres
    targetRevision: "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: etherpad
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
